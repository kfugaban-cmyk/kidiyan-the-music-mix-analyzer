kind = "web"
previewPath = "/"
title = "Mix Analyzer"
version = "1.0.0"
id = "artifacts/mix-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24355

[services.development]
run = "pnpm --filter @workspace/mix-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mix-analyzer", "run", "build" ]
publicDir = "artifacts/mix-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24355"
BASE_PATH = "/"
